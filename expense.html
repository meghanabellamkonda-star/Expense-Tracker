<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alien+Block&family=Comfortaa:wght@300..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="./expense.css">
    
</head>
  <body>
    <div class="header">
        <p class="header-content">Expense<br>Tracker <img src="./image.png" alt="" width="35px"></p>
    </div>
    <div class="input-form">
        <div class="form-floating inputs">
  <input type="number" class="form-control" id="amount" placeholder="name@example.com">
  <label for="floatingInput">Amount</label>
</div>
<select class="form-select inputs" id="type" aria-label="Default select example">
  <option selected>Transaction Type</option>
  <option value="income">Income</option>
  <option value="expense">Expense</option>
  
</select>
<div class="form-floating inputs" >
  <input type="date" class="form-control" id="date" placeholder="name@example.com">
  <label for="floatingInput">Date</label>
</div>
<button class="plus" id="plus" type="button">+</button>
    </div>
    <div class="cards">
        <div class="card" style="width: 18rem;">
  <div class="card-body">
    <h5 class="card-title" >Total Income</h5>
<h1 class="amount">$<span id="income">0</span></h1>
  
  </div>
</div>
<div class="card" style="width: 18rem;">
  <div class="card-body">
    <h5 class="card-title" >Total Expense</h5>
   <h1 class="amount">$<span id="expense">0</span></h1>
  
  </div>
</div>
<div class="card" style="width: 18rem;">
 <div class="card-body">
    <h5 class="card-title">Balance</h5>
   <h1  class="amount" >$ <span id="balance">0</span> </h1>
  
  </div>
</div>
    </div>
    <table id="transaction-table">
        <tr id="header-row">
            <th>Amount</th>
            <th>Transaction Type</th>
            <th>Transaction Date</th>
            <th>Action</th>
        </tr>
        
       

    </table>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
 <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
<script src="./expense.js"></script>
</body>
</html>
